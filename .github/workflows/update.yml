name: "\U0001f6e1\ufe0f Update CyberSec Events"

on:
  schedule:
    - cron: '0 8 * * 1,4'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-events:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - run: pip install -r requirements.txt

      - run: python scraper.py --scrape --generate --stats

      - run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -A
          git diff --staged --quiet || git commit -m "\U0001f504 Auto-update: $(date +'%Y-%m-%d %H:%M') UTC"
          git push
